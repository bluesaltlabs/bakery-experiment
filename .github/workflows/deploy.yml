name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli
      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen
      - name: Build WASM
        run: ./wasm-build.sh
      - name: Patch table init for non-SW COOP fallback
        run: |
          python3 -c "
          import re
          with open('web/bakery-experiment.js') as f:
              c = f.read()
          old = '''        __wbindgen_init_externref_table: function() {
            const table = wasm.__wbindgen_externrefs;
            const offset = table.grow(4);
            table.set(0, undefined);
            table.set(offset + 0, undefined);
            table.set(offset + 1, null);
            table.set(offset + 2, true);
            table.set(offset + 3, false);
        },'''
          new = '''        __wbindgen_init_externref_table: function() {
            const table = wasm.__wbindgen_externrefs;
            let offset;
            try { offset = table.grow(4); } catch (e) { offset = table.length - 4; }
            table.set(0, undefined);
            table.set(offset + 0, undefined);
            table.set(offset + 1, null);
            table.set(offset + 2, true);
            table.set(offset + 3, false);
        },'''
          c = c.replace(old, new)
          with open('web/bakery-experiment.js', 'w') as f:
              f.write(c)
          print('patched __wbindgen_init_externref_table')
          "
      - name: Prepare deploy directory
        run: |
          mkdir -p dist
          cp index.html dist/
          cp sw.js dist/
          cp -r web dist/web
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
